  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {

}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(

    [aria-selected=&quot;true&quot;],

}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {

  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {

}

    #qms-login .sop-row{padding:10px 0;border-bottom:1px solid var(--border)}
    #qms-login .sop-row:last-child{border-bottom:0}
    #qms-login .sop-options{display:flex;gap:9px;margin-top:8px;flex-wrap:wrap}
    #qms-login .defect-panel{display:grid;gap:7px;padding:10px;border-top:1px solid var(--border)}
    #qms-login .defect-accordion{background:color-mix(in srgb,var(--viz-series-1) 8%,var(--card));border:1px solid color-mix(in srgb,var(--viz-series-1) 18%,var(--border))}
    #qms-login .defect-accordion:nth-child(2){background:color-mix(in srgb,var(--viz-series-4) 7%,var(--card))}
    #qms-login .defect-accordion:nth-child(3){background:color-mix(in srgb,var(--destructive) 6%,var(--card))}
    #qms-login .defect-accordion summary{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 10px;cursor:pointer;font-weight:500;list-style:none}
    #qms-login .defect-accordion summary::-webkit-details-marker{display:none}
    #qms-login .defect-accordion summary::after{content:&quot;+&quot;;color:var(--muted-foreground)}
    #qms-login .defect-accordion[open] summary::after{content:&quot;−&quot;}
    #qms-login .defect-detail{display:grid;gap:8px;padding:9px 10px;border-top:1px solid var(--border);background:color-mix(in srgb,var(--card) 94%,transparent)}
    #qms-login .defect-field{display:grid;gap:5px}
    #qms-login .defect-name-control{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px}
    #qms-login .defect-category-head{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px;align-items:end}
    #qms-login .defect-items{display:grid;gap:10px}
    #qms-login .defect-item{display:grid;gap:7px;padding-top:9px;border-top:1px solid var(--border)}
    #qms-login .defect-item:first-child{padding-top:0;border-top:0}
    #qms-login .defect-release-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    #qms-login .defect-photo-status{color:var(--muted-foreground)}
    #qms-login .sop-message{padding:10px;color:var(--muted-foreground)}
    #qms-login .sop-actions{display:grid;gap:8px;padding:10px;border-top:1px solid var(--border)}
    #qms-login .future-placeholder{display:grid;place-items:center;min-height:390px;text-align:center;color:var(--muted-foreground)}
    #qms-login .menu-list{display:grid;gap:8px;padding:10px}
    #qms-login .menu-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px;background:color-mix(in srgb,var(--viz-series-1) 8%,transparent)}
    #qms-login .menu-item.alert{background:color-mix(in srgb,var(--destructive) 9%,transparent)}
    #qms-login .sop-grid-mini{display:grid;grid-template-columns:1fr repeat(3,24px);gap:8px;align-items:center;padding:12px}
    #qms-login .sop-grid-mini .form-check-input{margin:0}
    @media(max-width:700px){#qms-login .login-shell{grid-template-columns:1fr}#qms-login .story{padding:24px;min-height:300px}#qms-login .hero{margin:42px 0 20px}#qms-login .quality-path,#qms-login .story-foot{display:none}#qms-login .login-side{padding:32px 20px}}
    @media(max-width:1000px){#qms-login .workspace-body{grid-template-columns:150px minmax(0,1fr) 170px}#qms-login .workspace-body.no-right{grid-template-columns:150px minmax(0,1fr)}#qms-login .work-area{padding:8px}#qms-login .sample-table th,#qms-login .sample-table td,#qms-login .component-table th,#qms-login .component-table td{padding:7px 5px}}
    @media(max-width:700px){#qms-login .workspace-body{grid-template-columns:150px minmax(0,1fr)}#qms-login .rail.right{grid-column:1/-1}#qms-login .workspace-tip{display:none}#qms-login .completion-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){#qms-login .workspace-top{grid-template-columns:1fr auto}#qms-login .workspace-title{display:none}#qms-login .workspace-body{grid-template-columns:1fr}#qms-login .rail.right{grid-column:auto}#qms-login .work-steps{grid-template-columns:repeat(3,1fr);gap:14px}#qms-login .work-step::after{display:none}#qms-login .task-heading,#qms-login .task-actions{display:grid}#qms-login .sample-table th:nth-child(3),#qms-login .sample-table td:nth-child(3),#qms-login .sample-table th:nth-child(4),#qms-login .sample-table td:nth-child(4){display:none}#qms-login .compare-grid,#qms-login .match-check{grid-template-columns:1fr}#qms-login .photo-grid,#qms-login .upload-preview{grid-template-columns:1fr 1fr}#qms-login .completion-body{padding:24px}#qms-login .completion-grid{grid-template-columns:1fr}}

  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;

    target?.nodeType != null &amp;&amp; trigger.contains(target);

    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;

    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);

  document.addEventListener(&quot;focusout&quot;, handleLeave);
